<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Funny Website</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #111;
    color: white;
    flex-direction: column;
    font-family: Arial;
}

/* شكل الإيد */
.hand {
    font-size: 120px;
    cursor: pointer;
    transition: 0.3s;
}

/* النص */
#text {
    margin-top: 20px;
    font-size: 24px;
    opacity: 0;
    transition: 0.5s;
}
</style>

</head>
<body>

<div class="hand" onclick="changeHand()" id="hand">
✊
</div>

<div id="text">احمد محمد مراد بيه 😎</div>

<script>
function changeHand() {
    document.getElementById("hand").innerHTML = "🖕";
    document.getElementById("text").style.opacity = "1";
}
</script>

</body>
</html>
