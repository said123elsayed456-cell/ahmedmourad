<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ahmed Mourad</title>

<style>

body{
    margin:0;
    padding:0;
    background:#000;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    color:#1e90ff;
    font-size:50px;
    margin-bottom:10px;
}

.line{
    width:260px;
    height:2px;
    background:white;
    margin:auto;
    margin-bottom:40px;
}

.hand{
    font-size:120px;
    cursor:pointer;
    transition:0.3s;
}

.text{
    margin-top:20px;
    font-size:28px;
    opacity:0;
    transition:0.5s;
}

</style>
</head>

<body>

<div class="container">

    <h1>ahmedmourad</h1>

    <div class="line"></div>

    <div class="hand" id="hand" onclick="changeHand()">
        ✊
    </div>

    <div class="text" id="text">
   .  احمد محمد مراد بيه يلا😎
    </div>

</div>

<script>

function changeHand(){

    document.getElementById("hand").innerHTML = "🖕";

    document.getElementById("text").style.opacity = "1";
}

</script>

</body>
</html>
